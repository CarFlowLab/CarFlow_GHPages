<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarFlow</title>
  <link rel="icon" type="image/png" href="assets/logos/CarFlow Logo Simplified.png">

  <!-- Preload fonts -->
  <link rel="preload" href="assets/fonts/UberMove-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="assets/fonts/UberMove-Medium.woff2" as="font" type="font/woff2" crossorigin>

  <!-- Plotly.js from CDN -->
  <script src="https://cdn.plot.ly/plotly-2.35.0.min.js" charset="utf-8"></script>
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <img src="assets/logos/CarFlow Logo Hor 8.png" alt="CarFlow" class="sidebar-logo">
    </div>

    <!-- Car Selection -->
    <div class="sidebar-section">
      <h5 class="sidebar-section-title">Make and model</h5>
      <select id="select-make" class="cf-select">
        <option value="">Select Make</option>
      </select>
      <select id="select-model" class="cf-select" disabled>
        <option value="">Select Model</option>
      </select>
      <div id="variant-container" class="variant-container">
        <div id="selected-variants" class="selected-variants"></div>
        <select id="select-variant" class="cf-select" disabled>
          <option value="">Select Variant</option>
        </select>
      </div>
    </div>

    <!-- Page-specific sidebar content injected here -->
    <div id="sidebar-dynamic"></div>
  </aside>

  <!-- MAIN CONTENT -->
  <main id="main-content" class="main-content">
    <!-- TOP NAV -->
    <nav class="top-nav">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      </button>
      <div class="nav-tabs">
        <button class="nav-tab active" data-page="market">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
          Market
        </button>
        <button class="nav-tab" data-page="ads">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
          Advertisements
        </button>
      </div>
      <div class="nav-spacer"></div>
    </nav>

    <!-- PAGE CONTENT -->
    <div id="page-content" class="page-content">
      <!-- Loading indicator -->
      <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Loading data...</p>
      </div>
    </div>
  </main>

  <!-- JS Modules -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/pages/market.js"></script>
  <script src="js/pages/ads.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
